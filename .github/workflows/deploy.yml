name: Deploy to Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: AI Code Review
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'gemini' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run ai-review

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: 'dist/**,package.json,pnpm-lock.yaml,pnpm-workspace.yaml,ecosystem.config.js,.env.production,doc/nginx.conf'
          target: /var/www/changan-map-editor/

      - name: Restart application
        uses: appleboy/ssh-action@v1.0.3
        env:
          NGINX_CONTAINER: ${{ secrets.NGINX_CONTAINER }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          envs: NGINX_CONTAINER
          script: |
            set -e
            mkdir -p /var/www/changan-map-editor/logs
            cd /var/www/changan-map-editor
            pnpm install --prod --frozen-lockfile --ignore-scripts
            pm2 startOrRestart ecosystem.config.js --env production
            pm2 save

            if [ -f doc/nginx.conf ]; then
              NGINX_CONTAINER="${NGINX_CONTAINER:-nginx-server}"
              if ! docker inspect "$NGINX_CONTAINER" >/dev/null 2>&1; then
                NGINX_CONTAINER="$(docker ps --format '{{.Names}} {{.Image}}' | awk 'tolower($0) ~ /nginx/ {print $1; exit}')"
              fi

              if [ -z "$NGINX_CONTAINER" ]; then
                echo "No nginx container found. Set the NGINX_CONTAINER GitHub secret to your container name." >&2
                exit 1
              fi

              docker cp doc/nginx.conf "$NGINX_CONTAINER:/etc/nginx/conf.d/changan-map-editor.conf"
              docker exec "$NGINX_CONTAINER" nginx -t
              docker exec "$NGINX_CONTAINER" nginx -s reload
            fi
